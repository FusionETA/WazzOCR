<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — WazzOCR</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div class="topbar">
    <span class="brand"><span class="logo">FE</span> WazzOCR <span class="badge neutral" style="margin-left:.4rem;">Admin</span></span>
    <div class="right"><span class="who" id="whoLabel"></span><button class="btn btn-ghost btn-sm" id="logoutBtn">Sign out</button></div>
  </div>
  <div class="container wide" id="app"><div class="card">Loading…</div></div>
  <script>
  const app = document.getElementById('app');
  const esc = (s) => String(s==null?'':s).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
  async function api(method, url, body) {
    const r = await fetch(url, { method, headers: body?{'Content-Type':'application/json'}:undefined, body: body?JSON.stringify(body):undefined });
    const data = await r.json().catch(()=>({}));
    if (!r.ok) throw new Error(data.error || ('HTTP '+r.status));
    return data;
  }
  document.getElementById('logoutBtn').onclick = async () => { await fetch('/auth/logout',{method:'POST'}); location.href='/login.html'; };

  async function guard() {
    try { const me = await api('GET','/auth/me');
      document.getElementById('whoLabel').textContent = me.user.name || me.user.email;
      if (!me.user.isSuperAdmin) { app.innerHTML = '<div class="card">Admin access required. <a href="/account.html">Go to your account</a></div>'; return false; }
      return true;
    } catch { location.href='/login.html'; return false; }
  }

  async function renderList() {
    const { accounts } = await api('GET','/admin/accounts');
    app.innerHTML = `
      <div class="page-head"><h1>Accounts</h1><p>Manage customer accounts, channels and configuration.</p></div>
      <div class="card">
        <table class="table"><thead><tr><th>Name</th><th>Status</th><th>AI model</th><th>Created</th><th></th></tr></thead>
        <tbody>${accounts.map(a=>`<tr><td><strong>${esc(a.name)}</strong></td>
          <td><span class="badge ${a.status==='active'?'success':'pending'}">${esc(a.status)}</span></td>
          <td class="muted">${esc(a.ai_model)}</td><td class="muted num-cell">${new Date(a.created_at).toLocaleDateString()}</td>
          <td style="text-align:right;"><button class="btn btn-ghost btn-sm" onclick="openAccount(${a.id})">Open →</button></td></tr>`).join('')}</tbody></table>
        ${accounts.length?'':'<div class="empty">No accounts yet.</div>'}</div>
      <div class="card"><h2>Create account</h2>
        <div style="display:flex;gap:.6rem;align-items:flex-end;flex-wrap:wrap;"><div style="flex:1;min-width:200px;"><input id="newAcctName" placeholder="Company / account name"></div>
        <button class="btn btn-primary" onclick="createAccount()">Create</button></div><div class="msg" id="createMsg"></div></div>
      <div class="card"><h2>General AI prompt</h2>
        <p class="muted">Shared base prompt applied to every account. Each account can add its own extra rules.</p>
        <textarea id="generalPrompt" rows="8"></textarea>
        <div style="margin-top:.6rem;"><button class="btn btn-primary" onclick="saveGeneralPrompt()">Save general prompt</button></div>
        <div class="msg" id="gpMsg"></div></div>`;
    try { document.getElementById('generalPrompt').value = (await api('GET','/admin/settings/general-prompt')).generalPrompt || ''; } catch {}
  }
  window.createAccount = async () => {
    const name = document.getElementById('newAcctName').value.trim(); const m = document.getElementById('createMsg');
    if (!name) { m.className='msg err'; m.textContent='Enter a name.'; return; }
    try { await api('POST','/admin/accounts',{name}); renderList(); } catch(e){ m.className='msg err'; m.textContent=e.message; }
  };
  window.saveGeneralPrompt = async () => {
    const m = document.getElementById('gpMsg');
    try { await api('PUT','/admin/settings/general-prompt',{ generalPrompt: document.getElementById('generalPrompt').value }); m.className='msg ok'; m.textContent='Saved.'; }
    catch(e){ m.className='msg err'; m.textContent=e.message; }
  };

  window.openAccount = async (id) => {
    const d = await api('GET','/admin/accounts/'+id);
    const counts = {}; (d.statusCounts||[]).forEach(s=>counts[s.status]=s.n);
    app.innerHTML = `
      <div class="page-head"><button class="linkbtn" onclick="renderList()">← All accounts</button><h1 style="margin-top:.4rem;">${esc(d.account.name)}</h1></div>
      <div class="card">
        <div style="display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;">
          <span class="badge success">success ${counts.success||0}</span><span class="badge failed">failed ${counts.failed||0}</span>
          <span class="badge pending">pending ${counts.pending||0}</span><span class="muted" style="margin-left:.3rem;">COA codes: ${d.coaCount}</span></div>
        ${(d.failureReasons||[]).length?`<h3>Top failure reasons</h3><table class="table"><tbody>${d.failureReasons.map(f=>`<tr><td>${esc(f.failure_reason||'(none)')}</td><td style="text-align:right" class="num-cell">${f.n}</td></tr>`).join('')}</tbody></table>`:''}</div>

      <div class="card"><h2>Settings</h2>
        <div class="grid2">
          <div class="field"><label>Status</label><select id="setStatus">${['active','suspended','trial'].map(s=>`<option ${d.account.status===s?'selected':''}>${s}</option>`).join('')}</select></div>
          <div class="field"><label>AI model</label><select id="setModel">${['gemini-2.5-flash','gemini-2.5-flash-lite','gemini-2.5-pro','gemini-2.0-flash'].map(s=>`<option ${d.account.ai_model===s?'selected':''}>${s}</option>`).join('')}</select></div>
        </div>
        <div class="field"><label>Auto-create Xero bills</label><select id="setAuto"><option value="1" ${d.account.auto_create_bills?'selected':''}>Yes</option><option value="0" ${!d.account.auto_create_bills?'selected':''}>No</option></select></div>
        <div class="field"><label>Per-account prompt add-on</label><textarea id="setAddon" rows="5" placeholder="Extra AI rules for this account…">${esc(d.account.ai_prompt_addon||'')}</textarea></div>
        <button class="btn btn-primary" onclick="saveSettings(${id})">Save settings</button><div class="msg" id="setMsg"></div></div>

      <div class="card"><h2>Users</h2>
        <table class="table"><tbody>${(d.users||[]).map(u=>`<tr><td>${esc(u.name||'-')}</td><td>${esc(u.email)}</td><td style="text-align:right;"><span class="badge ${u.status==='active'?'success':'pending'}">${esc(u.status)}</span></td></tr>`).join('')||'<tr><td class="muted">No users</td></tr>'}</tbody></table>
        <h3>Invite a user (WhatsApp)</h3>
        <div class="grid2"><div class="field"><label>Email</label><input id="invEmail" type="email"></div><div class="field"><label>Phone (e.g. 60123…)</label><input id="invPhone"></div></div>
        <div class="field"><label>Name</label><input id="invName"></div>
        <button class="btn btn-primary" onclick="invite(${id})">Send invite</button><div class="msg" id="invMsg"></div></div>

      <div class="card"><h2>Wazzup channels</h2>
        <table class="table"><tbody>${(d.channels||[]).map(c=>`<tr><td>${esc(c.label||'(no label)')}</td><td class="muted">${esc(c.channel_id)}</td><td><span class="badge ${c.status==='active'?'success':'skipped'}">${esc(c.status)}</span></td>
          <td style="text-align:right;white-space:nowrap;"><button class="linkbtn" onclick="registerWebhook(${id},${c.id})">Register webhook</button> &nbsp; <button class="linkbtn danger" onclick="delChannel(${id},${c.id})">Remove</button></td></tr>`).join('')||'<tr><td class="muted">No channels</td></tr>'}</tbody></table>
        <div class="msg" id="regMsg"></div>
        <h3>Add channel</h3>
        <div class="grid2"><div class="field"><label>Channel ID</label><input id="chId"></div><div class="field"><label>Label</label><input id="chLabel"></div></div>
        <div class="field"><label>API key (optional)</label><input id="chKey"></div>
        <button class="btn btn-primary" onclick="addChannel(${id})">Add channel</button><div class="msg" id="chMsg"></div></div>

      <div class="card"><h2>Xero organisations</h2>
        <table class="table"><tbody>${(d.connections||[]).map(x=>`<tr><td>${esc(x.tenant_name||x.xero_tenant_id)}</td><td style="text-align:right;"><span class="badge ${x.status==='active'?'success':'failed'}">${esc(x.status)}</span>${x.needs_reconnect?' <span class="badge failed">reconnect</span>':''}</td></tr>`).join('')||'<tr><td class="muted">None connected yet</td></tr>'}</tbody></table>
        <a class="btn btn-primary" style="margin-top:.7rem;" href="/admin/accounts/${id}/xero/connect">＋ Connect Xero</a>
        <p class="muted" style="margin-top:.5rem;">Opens Xero's consent screen — you'll need this account's Xero login.</p></div>

      <div class="card"><h2>Chart of accounts</h2>
        <p class="muted">CSV columns: code, name, category. Replaces the current ${d.coaCount} codes.</p>
        <textarea id="coaCsv" rows="6" placeholder="926-0000,Utilities Expenses,Expense"></textarea>
        <div style="margin-top:.6rem;"><button class="btn btn-primary" onclick="uploadCoa(${id})">Upload COA</button></div><div class="msg" id="coaMsg"></div></div>`;
  };
  window.saveSettings = async (id) => { const m=document.getElementById('setMsg');
    try { await api('PUT','/admin/accounts/'+id, { status:document.getElementById('setStatus').value, aiModel:document.getElementById('setModel').value, autoCreateBills:document.getElementById('setAuto').value==='1', aiPromptAddon:document.getElementById('setAddon').value });
      m.className='msg ok'; m.textContent='Saved.'; } catch(e){ m.className='msg err'; m.textContent=e.message; } };
  window.invite = async (id) => { const m=document.getElementById('invMsg');
    try { const r=await api('POST','/admin/accounts/'+id+'/invite',{ email:document.getElementById('invEmail').value.trim(), phone:document.getElementById('invPhone').value.trim(), name:document.getElementById('invName').value.trim() });
      m.className='msg ok'; m.textContent = r.sent?'Invite sent via WhatsApp.':('WhatsApp send failed. Share this link: '+r.link); openAccount(id); } catch(e){ m.className='msg err'; m.textContent=e.message; } };
  window.addChannel = async (id) => { const m=document.getElementById('chMsg');
    try { await api('POST','/admin/accounts/'+id+'/channels',{ channelId:document.getElementById('chId').value.trim(), label:document.getElementById('chLabel').value.trim(), apiKey:document.getElementById('chKey').value.trim()||undefined }); openAccount(id); } catch(e){ m.className='msg err'; m.textContent=e.message; } };
  window.delChannel = async (id,cid) => { try { await api('DELETE','/admin/accounts/'+id+'/channels/'+cid); openAccount(id); } catch(e){ alert(e.message); } };
  window.registerWebhook = async (id,cid) => { const m=document.getElementById('regMsg'); m.className='msg'; m.style.display='block'; m.textContent='Registering…';
    try { await api('POST','/admin/accounts/'+id+'/channels/'+cid+'/register-webhook'); m.className='msg ok'; m.textContent='Webhook registered with Wazzup ✓'; } catch(e){ m.className='msg err'; m.textContent=e.message; } };
  window.uploadCoa = async (id) => { const m=document.getElementById('coaMsg');
    try { const r=await api('POST','/admin/accounts/'+id+'/coa',{ csv:document.getElementById('coaCsv').value }); m.className='msg ok'; m.textContent=`Uploaded ${r.count} codes.`; } catch(e){ m.className='msg err'; m.textContent=e.message; } };

  (async () => { if (await guard()) renderList(); })();
  </script>
</body>
</html>
