<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password — WazzOCR</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div class="auth-bg">
    <div class="auth-card">
      <span class="logo">FE</span>
      <h1>Reset password</h1>
      <p class="sub">Choose a new password for your account.</p>
      <form id="resetForm">
        <label class="fld" for="password">New password</label>
        <input type="password" id="password" autocomplete="new-password" minlength="8" required>
        <label class="fld" for="confirm">Confirm password</label>
        <input type="password" id="confirm" autocomplete="new-password" minlength="8" required>
        <button type="submit" class="btn btn-primary" id="submitBtn" style="width:100%;margin-top:1.4rem;">Update password</button>
      </form>
      <div class="msg" id="msg"></div>
      <div class="links"><a href="/login.html">Back to sign in</a></div>
    </div>
  </div>
  <script>
    const token = new URLSearchParams(location.search).get('token');
    const msg = document.getElementById('msg');
    function showMsg(t, ok) { msg.textContent = t; msg.className = 'msg ' + (ok ? 'ok' : 'err'); }
    if (!token) showMsg('This link is missing its token. Please use the link from your WhatsApp message.');
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = document.getElementById('password').value, cf = document.getElementById('confirm').value;
      if (pw !== cf) { showMsg('Passwords do not match.'); return; }
      const btn = document.getElementById('submitBtn'); btn.disabled = true;
      try {
        const r = await fetch('/auth/reset', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, password: pw }) });
        const data = await r.json();
        if (!r.ok) { showMsg(data.error || 'Could not reset password.'); btn.disabled = false; return; }
        showMsg('Password updated. You can now sign in.', true);
        setTimeout(() => window.location.href = '/login.html', 1500);
      } catch (err) { showMsg('Network error. Please try again.'); btn.disabled = false; }
    });
  </script>
</body>
</html>
