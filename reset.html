<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password — WazzOCR</title>
  <style>
    :root { --primary:#1A2E6F; --border:#E2E8F0; --muted:#6B7A8D; --text:#1C2B3A; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,Segoe UI,Roboto,sans-serif; color:var(--text);
      background:linear-gradient(135deg,#1A2E6F 0%,#2D4DB3 100%);
      min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:#fff; border-radius:16px; padding:2rem; width:100%; max-width:380px; box-shadow:0 8px 32px rgba(26,46,111,.25); }
    h1 { margin:0 0 .25rem; font-size:1.3rem; }
    p.sub { margin:0 0 1.5rem; color:var(--muted); font-size:.9rem; }
    label { display:block; font-size:.72rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin:1rem 0 .35rem; }
    input { width:100%; padding:.65rem .8rem; border:1px solid var(--border); border-radius:8px; font-size:.95rem; outline:none; }
    input:focus { border-color:var(--primary); }
    button { width:100%; margin-top:1.5rem; padding:.75rem; border:none; border-radius:8px; background:var(--primary); color:#fff; font-weight:700; font-size:.95rem; cursor:pointer; }
    button:disabled { opacity:.6; cursor:not-allowed; }
    .msg { margin-top:1rem; font-size:.85rem; padding:.6rem .75rem; border-radius:8px; display:none; }
    .msg.error { background:#FEF2F2; color:#B91C1C; display:block; }
    .msg.ok { background:#F0FDF4; color:#15803D; display:block; }
    .links { margin-top:1.25rem; text-align:center; font-size:.85rem; }
    .links a { color:var(--primary); text-decoration:none; font-weight:600; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Reset password</h1>
    <p class="sub">Choose a new password for your account.</p>
    <form id="resetForm">
      <label for="password">New password</label>
      <input type="password" id="password" autocomplete="new-password" minlength="8" required>
      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" autocomplete="new-password" minlength="8" required>
      <button type="submit" id="submitBtn">Update password</button>
    </form>
    <div class="msg" id="msg"></div>
    <div class="links"><a href="/login.html">Back to sign in</a></div>
  </div>
  <script>
    const token = new URLSearchParams(location.search).get('token');
    const msg = document.getElementById('msg');
    function showMsg(t, ok) { msg.textContent = t; msg.className = 'msg ' + (ok ? 'ok' : 'error'); }
    if (!token) showMsg('This link is missing its token. Please use the link from your WhatsApp message.');
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = document.getElementById('password').value, cf = document.getElementById('confirm').value;
      if (pw !== cf) { showMsg('Passwords do not match.'); return; }
      const btn = document.getElementById('submitBtn'); btn.disabled = true;
      try {
        const r = await fetch('/auth/reset', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, password: pw }) });
        const data = await r.json();
        if (!r.ok) { showMsg(data.error || 'Could not reset password.'); btn.disabled = false; return; }
        showMsg('Password updated. You can now sign in.', true);
        setTimeout(() => window.location.href = '/login.html', 1500);
      } catch (err) { showMsg('Network error. Please try again.'); btn.disabled = false; }
    });
  </script>
</body>
</html>
