<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My account — WazzOCR</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <meta name="robots" content="noindex, nofollow">
</head>
<body>
  <div class="topbar">
    <span class="brand"><img class="brand-logo" src="/assets/fusioneta-logo.png" alt="FusionETA"><span class="brand-divider"></span><span class="brand-name">WazzOCR</span></span>
    <div class="right"><span class="who" id="whoLabel"></span><button class="btn btn-ghost btn-sm" id="logoutBtn">Sign out</button></div>
  </div>
  <div class="container" id="content"><div class="card">Loading…</div></div>
  <script>
    let CONNECTIONS = [];
    let CURRENT_ACCOUNT = null;
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
    function badge(s, reason){ const k=['success','failed','pending','skipped'].includes(s)?s:'skipped'; return `<span class="badge ${k}" title="${esc(reason||'')}">${esc(s)}</span>`; }
    function money(b){ return b.total!=null ? esc(b.currency||'')+' '+Number(b.total).toFixed(2) : '-'; }
    function dt(s){ return new Date(s).toLocaleDateString(); }
    document.getElementById('logoutBtn').onclick = async () => { await fetch('/auth/logout',{method:'POST'}); location.href='/login.html'; };

    async function load() {
      let data;
      try { const r = await fetch('/api/me/summary'); if (r.status===401){location.href='/login.html';return;} data = await r.json(); }
      catch { document.getElementById('content').innerHTML='<div class="card">Could not load. Please refresh.</div>'; return; }
      document.getElementById('whoLabel').textContent = data.user.name || data.user.email;
      CURRENT_ACCOUNT = data.account || null;
      const c = document.getElementById('content');
      if (data.user.isSuperAdmin) {
        c.innerHTML = `<div class="page-head"><h1>Account</h1></div>
          <div class="card"><div class="kv"><div class="k">Name</div><div>${esc(data.user.name||'-')}</div></div>
          <div class="kv"><div class="k">Email</div><div>${esc(data.user.email)}</div></div>
          <div class="kv"><div class="k">Role</div><div>Super admin (FusionETA)</div></div></div>
          <div class="card"><a class="btn btn-primary" href="/admin.html">Open the admin dashboard →</a></div>`;
        return;
      }
      c.innerHTML = `
        <div class="page-head"><h1>${esc(data.account?data.account.name:'My account')}</h1><p>Bill automation overview</p></div>
        <div class="card hero"><div class="eyebrow">Bills created this month</div>
          <div class="stat" style="margin-top:.4rem;"><span class="num">${data.successThisMonth!=null?data.successThisMonth:data.successCount}</span><span class="unit">bills</span></div>
          <div class="muted" style="margin-top:.3rem;">${data.successCount} all-time</div></div>
        <div class="tabs">
          <button data-tab="bills" class="active" onclick="switchTab('bills')">Bills</button>
          <button data-tab="unmatched" onclick="switchTab('unmatched')">Unmatched</button>
          <button data-tab="settings" onclick="switchTab('settings')">Settings</button>
        </div>
        <div class="panel active" id="panel-bills"><div class="card"><h2>Created bills <span class="title-count" id="count-bills"></span></h2>${filterBar('bills')}<div id="billsList">Loading…</div></div></div>
        <div class="panel" id="panel-unmatched"><div class="card"><h2>Unmatched / pending <span class="title-count" id="count-pending"></span></h2>${filterBar('pending')}<div id="pendingList">Loading…</div></div></div>
        <div class="panel" id="panel-settings">${settingsHtml(data)}</div>`;
      wireFilters('bills'); wireFilters('pending');
      loadBills(); loadPending(); wireSettings();
      // restore the tab the user was on before a refresh
      const initialTab = (location.hash||'').replace(/^#/,'');
      if (['bills','unmatched','settings'].includes(initialTab)) switchTab(initialTab);
      maybeShowOnboarding(data);
    }

    // ── Forced onboarding (org name + phone) ──
    // Shown until the account's setup_complete is 1. Cannot be dismissed; it
    // reappears on every visit until completed.
    function maybeShowOnboarding(data){
      if (!data.account || data.account.setupComplete) return;
      if (document.getElementById('onbOverlay')) return;
      const ov = document.createElement('div');
      ov.id = 'onbOverlay';
      ov.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(15,45,74,.55);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:1rem;';
      ov.innerHTML = `
        <div class="card" style="max-width:420px;width:100%;margin:0;">
          <h2 style="margin-bottom:.3rem;">Finish setting up</h2>
          <p class="muted" style="margin-bottom:1rem;">Tell us your organisation name and the WhatsApp number you'll send bills from — this is needed before you can start.</p>
          <div class="field"><label>Organisation name</label><input id="onbOrg" autocomplete="organization" placeholder="Your company"></div>
          <div class="field" style="margin-top:.6rem;"><label>WhatsApp number</label><input id="onbPhone" inputmode="tel" autocomplete="tel" placeholder="60123456789"></div>
          <p class="muted" style="font-size:.78rem;margin:.4rem 0 0;">Digits only, international format (e.g. 60123456789).</p>
          <button class="btn btn-primary" id="onbBtn" style="width:100%;margin-top:1.1rem;">Save & continue</button>
          <div class="msg" id="onbMsg"></div>
        </div>`;
      document.body.appendChild(ov);
      document.getElementById('onbBtn').onclick = submitOnboarding;
      document.getElementById('onbOrg').focus();
    }
    async function submitOnboarding(){
      const m = document.getElementById('onbMsg');
      const orgName = document.getElementById('onbOrg').value.trim();
      const phone = document.getElementById('onbPhone').value.trim();
      if (!orgName){ m.className='msg err'; m.textContent='Enter your organisation name.'; return; }
      if (phone.replace(/\D/g,'').length < 7){ m.className='msg err'; m.textContent='Enter a valid WhatsApp number (digits only).'; return; }
      const btn = document.getElementById('onbBtn'); btn.disabled = true;
      try {
        const r = await fetch('/api/me/onboard',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({orgName,phone})});
        const d = await r.json(); if(!r.ok) throw new Error(d.error||'Could not save.');
        location.reload();
      } catch(e){ m.className='msg err'; m.textContent=e.message; btn.disabled=false; }
    }
    // ── Table filtering (search by supplier/invoice/org + date range) ──
    function filterBar(key){
      const orgOpts = key === 'bills' && CONNECTIONS.length > 1
        ? `<div class="fb-field"><label>Xero org</label><select id="f-org-${key}"><option value="">All orgs</option>${CONNECTIONS.map(c=>`<option value="${esc(c.tenant_name||c.xero_tenant_id)}">${esc(c.tenant_name||c.xero_tenant_id)}</option>`).join('')}</select></div>`
        : '';
      return `<div class="filterbar" id="filterbar-${key}">
        <div class="fb-field fb-grow"><label>Search</label><input type="search" id="f-search-${key}" placeholder="Supplier, invoice${key==='bills'?' or Xero org':''}…"></div>
        ${orgOpts}
        <div class="fb-field"><label>From</label><input type="date" id="f-from-${key}"></div>
        <div class="fb-field"><label>To</label><input type="date" id="f-to-${key}"></div>
        <button class="btn btn-ghost btn-sm" type="button" id="f-clear-${key}">Clear</button></div>`;
    }
    function filteredItems(cfg){
      let arr = cfg.items;
      const s = (cfg.search||'').toLowerCase().trim();
      if (s) arr = arr.filter(b => [b.supplier,b.invoice_no,b.xero_tenant_name].some(x=>String(x||'').toLowerCase().includes(s)));
      if (cfg.org) arr = arr.filter(b => (b.xero_tenant_name||'') === cfg.org);
      if (cfg.from){ const f=new Date(cfg.from+'T00:00:00'); arr = arr.filter(b=> new Date(b.created_at) >= f); }
      if (cfg.to){ const t=new Date(cfg.to+'T23:59:59'); arr = arr.filter(b=> new Date(b.created_at) <= t); }
      return arr;
    }
    function wireFilters(key){
      const cfg=PG[key];
      const s=document.getElementById('f-search-'+key), fr=document.getElementById('f-from-'+key), to=document.getElementById('f-to-'+key), cl=document.getElementById('f-clear-'+key), org=document.getElementById('f-org-'+key);
      if(!s) return;
      const apply=()=>{ cfg.search=s.value; cfg.from=fr.value; cfg.to=to.value; if(org) cfg.org=org.value; cfg.page=1; renderTab(key); };
      s.oninput=apply; fr.onchange=apply; to.onchange=apply; if(org) org.onchange=apply;
      cl.onclick=()=>{ s.value='';fr.value='';to.value=''; if(org) org.value=''; cfg.search='';cfg.from='';cfg.to='';cfg.org=''; cfg.page=1; renderTab(key); };
    }
    function switchTab(name){
      document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active', b.dataset.tab===name));
      document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active', p.id==='panel-'+name));
      history.replaceState(null, '', '#'+name);  // remember tab across refresh
    }
    function billRow(b, withXero){
      return `<tr id="row-${b.id}"><td class="num-cell" style="color:var(--muted)">${dt(b.created_at)}</td>
        <td title="${esc(b.supplier||'')}">${esc(b.supplier||'-')}</td><td title="${esc(b.invoice_no||'')}">${esc(b.invoice_no||'-')}</td>
        <td class="num-cell">${money(b)}</td>
        ${withXero ? `<td title="${esc(b.xero_tenant_name||'')}">${esc(b.xero_tenant_name||'—')}</td><td>${b.xero_url?`<a href="${esc(b.xero_url)}" target="_blank" rel="noopener">Open ↗</a>`:'-'}</td>`
                   : `<td title="${esc(b.failure_reason||'')}"><span class="muted">${esc(b.failure_reason||'-')}</span></td><td style="text-align:right;white-space:nowrap;"><button class="linkbtn" onclick="openResolve(event,${b.id})">Resolve →</button> &nbsp; <button class="linkbtn danger" onclick="deletePending(event,${b.id})">Delete</button></td>`}</tr>`;
    }
    const PAGE_SIZE = 15;
    const PG = {
      bills:   { items: [], page: 1, withXero: true,  container: 'billsList',   empty: 'No created bills yet.', search:'', from:'', to:'', org:'' },
      pending: { items: [], page: 1, withXero: false, container: 'pendingList', empty: 'Nothing pending 🎉', search:'', from:'', to:'', org:'' }
    };
    async function loadBills(){ await loadTab('bills', 'success'); }
    async function loadPending(){ await loadTab('pending', 'pending'); }
    async function loadTab(key, status){
      try {
        const { bills } = await (await fetch('/api/me/bills?status='+status+'&limit=500')).json();
        PG[key].items = bills || []; PG[key].page = 1; renderTab(key);
      } catch {}
    }
    function renderTab(key){
      const cfg = PG[key]; const el = document.getElementById(cfg.container);
      const items = filteredItems(cfg);
      const active = !!(cfg.search || cfg.from || cfg.to);
      const cnt = document.getElementById('count-'+key);
      if (cnt) cnt.textContent = active ? `${items.length} / ${cfg.items.length}` : `${cfg.items.length}`;
      if (!items.length) { el.innerHTML = '<div class="empty">'+(active?'No bills match your filters.':cfg.empty)+'</div>'; return; }
      const pages = Math.max(1, Math.ceil(items.length / PAGE_SIZE));
      if (cfg.page > pages) cfg.page = pages;
      const start = (cfg.page-1)*PAGE_SIZE;
      const slice = items.slice(start, start+PAGE_SIZE);
      const head = cfg.withXero
        ? '<th>Date</th><th>Supplier</th><th>Invoice</th><th>Total</th><th>Xero org</th><th>Xero</th>'
        : '<th>Date</th><th>Supplier</th><th>Invoice</th><th>Total</th><th>Reason</th><th></th>';
      const cols = cfg.withXero
        ? '<col style="width:104px"><col><col style="width:150px"><col style="width:118px"><col><col style="width:84px">'
        : '<col style="width:104px"><col><col style="width:150px"><col style="width:118px"><col><col style="width:168px">';
      const pager = pages > 1 ? `<div style="display:flex;justify-content:space-between;align-items:center;margin-top:.8rem;font-size:.82rem;color:var(--muted);">
          <span>Showing ${start+1}–${start+slice.length} of ${items.length}</span>
          <span><button class="btn btn-ghost btn-sm" ${cfg.page===1?'disabled':''} onclick="goPage('${key}',${cfg.page-1})">‹ Prev</button>
          <span style="margin:0 .6rem;">${cfg.page} / ${pages}</span>
          <button class="btn btn-ghost btn-sm" ${cfg.page===pages?'disabled':''} onclick="goPage('${key}',${cfg.page+1})">Next ›</button></span></div>` : '';
      el.innerHTML = `<table class="table fixed"><colgroup>${cols}</colgroup><thead><tr>${head}</tr></thead><tbody>${slice.map(b=>billRow(b,cfg.withXero)).join('')}</tbody></table>${pager}`;
    }
    window.goPage = (key, p) => { PG[key].page = p; renderTab(key); };

    // Resolve an unmatched bill: choose a Xero org → create the draft.
    window.openResolve = (e, id) => {
      e.preventDefault();
      if (!CONNECTIONS.length) { alert('No Xero organisations connected. Connect Xero under Settings first.'); return; }
      const row = document.getElementById('row-'+id); if (!row) return;
      const items = CONNECTIONS.map(c=>({ value:c.xero_tenant_id||c.tenantId, label:c.tenant_name||c.tenantName||c.xero_tenant_id }));
      row.innerHTML = `<td colspan="6" style="overflow:visible;white-space:normal;"><div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;">
        <span class="muted">Create draft in:</span>
        <div id="rdrop-${id}" style="min-width:260px;"></div>
        <button class="btn btn-primary btn-sm" id="rbtn-${id}" onclick="doResolve(${id})">Create draft</button>
        <button class="linkbtn" onclick="loadPending()">Cancel</button>
        <span id="rmsg-${id}" class="muted"></span></div></td>`;
      window.__searchDropdown('rdrop-'+id, items, { placeholder:'Choose organisation' });
    };
    // Delete an unmatched/pending bill (created bills are protected server-side).
    window.deletePending = async (e, id) => {
      e.preventDefault();
      if (!confirm('Delete this unmatched bill? This cannot be undone.')) return;
      const row = document.getElementById('row-'+id);
      try {
        const r = await fetch('/api/me/bills/'+id, { method:'DELETE' });
        const d = await r.json(); if (!r.ok) throw new Error(d.error||'Delete failed.');
        // drop locally and re-render so the count updates without a full refetch
        PG.pending.items = PG.pending.items.filter(b => b.id !== id);
        renderTab('pending');
      } catch (err) { alert(err.message); }
    };
    window.doResolve = async (id) => {
      const dd = document.getElementById('rdrop-'+id);
      const tenantId = dd && dd.value ? dd.value() : '';
      if (!tenantId) { document.getElementById('rmsg-'+id).textContent = 'Choose an organisation.'; return; }
      const msg = document.getElementById('rmsg-'+id); const btn = document.getElementById('rbtn-'+id);
      btn.disabled = true; msg.textContent = 'Creating…';
      try {
        const r = await fetch('/api/me/bills/'+id+'/resolve', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ tenantId }) });
        const d = await r.json(); if (!r.ok) throw new Error(d.error||'Failed.');
        msg.textContent = 'Created ✓';
        // refresh both tabs and the counter
        loadBills(); loadPending();
        fetch('/api/me/summary').then(r=>r.json()).then(s=>{ const n=document.querySelector('.stat .num'); if(n) n.textContent=(s.successThisMonth!=null?s.successThisMonth:s.successCount); }).catch(()=>{});
      } catch (e) { btn.disabled = false; msg.textContent = e.message; }
    };
    function settingsHtml(data){
      return `
      <div class="settings-grid">
        <div class="col-left">
          <div class="card"><h2>Account</h2>
            <div class="kv"><div class="k">Organisation</div><div>${esc(data.account?data.account.name:'-')}</div></div>
            <div class="kv"><div class="k">Signed in as</div><div>${esc(data.user.name||data.user.email)}</div></div>
            <div class="kv"><div class="k">Xero organisations</div><div id="connList">…</div></div>
            <div style="margin-top:.9rem;display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;">
              <a href="/api/me/xero/connect" style="display:inline-block;background:#13B5EA;border-radius:6px;padding:2px 6px;line-height:0;"><img src="/assets/connect-white.svg" alt="Connect to Xero" style="height:36px;display:block;"></a>
              <button class="btn btn-ghost" type="button" onclick="refreshXeroCache(this)" title="Reload tax rates & accounts from Xero (after adding a new tax rate)">↻ Refresh tax rates</button>
            </div>
            <div class="msg" id="xeroCacheMsg"></div>
            <div id="taxRatesList" style="display:none;margin-top:.75rem;">
              <p class="muted" style="font-size:.8rem;margin-bottom:.4rem;">Tax rates fetched from Xero:</p>
              <table style="width:100%;font-size:.8rem;border-collapse:collapse;" id="taxRatesTable"></table>
            </div>
          </div>
        </div>
        <div class="col-right">
          ${(data.account&&data.account.plan==='trial') ? `
          <div class="card"><h2>WhatsApp <span class="badge success">Trial plan</span></h2>
            <p class="muted">You're on the <strong>Trial plan</strong> — no Wazzup setup needed. Send your bills to our shared WhatsApp number: <strong>+60 10-230 0975</strong>. Only messages from the phone numbers you list below will be processed; everything else is ignored.</p>
          </div>` : `
          <div class="card"><h2>WhatsApp channels</h2>
            <p class="muted">Add your Wazzup channel so bills sent to it are processed for your account. After adding, click “Register webhook” once.</p>
            <div id="channelsBox" style="margin:.6rem 0;">…</div>
            <div class="grid2"><div class="field"><label>Channel ID</label><input id="chanId"></div><div class="field"><label>Label (optional)</label><input id="chanLabel"></div></div>
            <div class="field"><label>API key</label><input id="chanKey"></div>
            <button class="btn btn-primary" id="chanAddBtn">Add channel</button>
            <div class="msg" id="chanMsg"></div>
          </div>`}
          <div class="card"><h2>Allowed phone numbers</h2>
            <div id="phoneToggleWrap" style="margin-bottom:.5rem;"></div>
            <p class="muted" id="phoneCardHint" style="margin:.2rem 0 .6rem;"></p>
            <div id="phonesBox" style="margin:.6rem 0;">…</div>
            <div id="phoneAddWrap">
              <div class="grid2"><div class="field"><label>Phone number</label><input id="phoneNum" placeholder="60123456789"></div><div class="field"><label>Label (optional)</label><input id="phoneLabel"></div></div>
              <button class="btn btn-primary" id="phoneAddBtn">Add number</button>
            </div>
            <div class="msg" id="phoneMsg"></div>
          </div>
          <div class="card"><h2>Chart of accounts</h2>
            <p class="muted">Upload a CSV with columns: code, name, category. Replaces your current list; used to auto-code bill line items. If a line item can't be matched here, WazzOCR falls back to your Xero Chart of Accounts to find the best match. <span id="coaCount"></span></p>
            <label class="file-drop" id="coaDrop">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              <span class="fd-text" id="coaFileText">Choose a CSV file or drag it here</span>
              <input type="file" id="coaFile" accept=".csv,text/csv" hidden>
            </label>
            <div style="margin-top:.6rem;display:flex;gap:.5rem;flex-wrap:wrap;">
              <button class="btn btn-primary" id="coaBtn">Upload COA</button>
              <a class="btn btn-ghost" id="coaDownload" href="/api/me/coa.csv">⬇ Download CSV (template + current)</a>
            </div>
            <div class="msg" id="coaMsg"></div>
          </div>
        </div>
      </div>`;
    }
    async function wireSettings(){
      try {
        const [conn, chan, coa] = await Promise.all([
          fetch('/api/me/connections').then(r=>r.json()),
          fetch('/api/me/channels').then(r=>r.json()),
          fetch('/api/me/coa').then(r=>r.json())
        ]);
        const conns = conn.connections||[];
        CONNECTIONS = conns.filter(c => c.status === 'active');
        // Re-inject the bills filterbar now that CONNECTIONS is known (org dropdown needs it)
        const fb = document.getElementById('filterbar-bills');
        if (fb) { fb.outerHTML = filterBar('bills'); wireFilters('bills'); }
        const expired = conns.filter(c => c.status === 'expired' || c.needs_reconnect);
        const cl = document.getElementById('connList');
        if (!conns.length) cl.textContent = 'None connected';
        else if (expired.length && !CONNECTIONS.length) {
          cl.innerHTML = `<div class="msg err" style="margin-bottom:.6rem;">
            ⚠️ Your Xero connection has expired or been revoked. Please reconnect to continue creating bills automatically.
          </div>
          <a href="/api/me/xero/connect" style="display:inline-block;background:#13B5EA;border-radius:6px;padding:2px 6px;line-height:0;"><img src="/assets/connect-white.svg" alt="Connect to Xero" style="height:36px;display:block;"></a>`;
        } else {
          let html = `<div id="xeroDrop" style="max-width:340px;"></div>
            <div id="xeroDiscRow" style="display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;margin-top:.45rem;">
              <span class="muted">${CONNECTIONS.length} connected</span>
            </div>
            <div class="msg" id="xeroDiscMsg"></div>`;
          if (expired.length) {
            html += `<div class="msg err" style="margin-top:.5rem;">
              ⚠️ ${expired.map(e=>esc(e.tenant_name||e.xero_tenant_id)).join(', ')}: connection expired. <a href="/api/me/xero/connect">Reconnect Xero</a> to restore.
            </div>`;
          }
          cl.innerHTML = html;
          window.__searchDropdown('xeroDrop', CONNECTIONS.map(x=>({ value:x.xero_tenant_id, label:x.tenant_name||x.xero_tenant_id })), {
            placeholder:'Browse organisations',
            onSelect(tid) {
              const conn = CONNECTIONS.find(c=>c.xero_tenant_id===tid);
              const discRow = document.getElementById('xeroDiscRow');
              if (!conn) { discRow.innerHTML = `<span class="muted">${CONNECTIONS.length} connected</span>`; return; }
              const name = esc(conn.tenant_name||conn.xero_tenant_id);
              discRow.innerHTML = `<span class="muted">${CONNECTIONS.length} connected</span>
                <a href="#" style="color:var(--bad);font-size:.88rem;" onclick="event.preventDefault();disconnectOrgById('${conn.id}','${name}')">Disconnect ${name}</a>`;
            }
          });
        }
        renderChannels(chan.channels||[]);
        document.getElementById('coaCount').textContent = '— ' + (coa.accounts||[]).length + ' codes loaded';
      } catch {}
      wireFileDrop('coaDrop','coaFile','coaFileText','Choose a CSV file or drag it here');
      const chanAddBtn = document.getElementById('chanAddBtn'); // absent on the trial plan
      if (chanAddBtn) chanAddBtn.onclick = async () => {
        const m = document.getElementById('chanMsg');
        const channelId=document.getElementById('chanId').value.trim(), apiKey=document.getElementById('chanKey').value.trim(), label=document.getElementById('chanLabel').value.trim();
        if (!channelId){ showM(m,'Channel ID is required.',false); return; }
        try { const r=await fetch('/api/me/channels',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({channelId,apiKey:apiKey||undefined,label:label||undefined})});
          const d=await r.json(); if(!r.ok) throw new Error(d.error||'Add failed.');
          document.getElementById('chanId').value='';document.getElementById('chanKey').value='';document.getElementById('chanLabel').value='';
          showM(m,'Channel added. Now click “Register webhook”.',true); wireSettings();
        } catch(e){ showM(m,e.message,false); }
      };
      // Allowed phone numbers (both plans)
      loadPhones();
      const phoneAddBtn = document.getElementById('phoneAddBtn');
      if (phoneAddBtn) phoneAddBtn.onclick = async () => {
        const m=document.getElementById('phoneMsg');
        const phone=document.getElementById('phoneNum').value.trim(), label=document.getElementById('phoneLabel').value.trim();
        if(!phone){ showM(m,'Enter a phone number.',false); return; }
        try { const r=await fetch('/api/me/phones',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone,label:label||undefined})});
          const d=await r.json(); if(!r.ok) throw new Error(d.error||'Add failed.');
          document.getElementById('phoneNum').value=''; document.getElementById('phoneLabel').value='';
          showM(m,'Number added.',true); loadPhones();
        } catch(e){ showM(m,e.message,false); }
      };
      document.getElementById('coaBtn').onclick = async () => {
        const m=document.getElementById('coaMsg');
        const f=document.getElementById('coaFile').files[0];
        if(!f){ showM(m,'Choose a CSV file first.',false); return; }
        try {
          const csv = await f.text();
          const r=await fetch('/api/me/coa',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({csv})});
          const d=await r.json(); if(!r.ok) throw new Error(d.error||'Upload failed.');
          showM(m,`Uploaded ${d.count} codes.`,true); document.getElementById('coaCount').textContent='— '+d.count+' codes loaded';
          document.getElementById('coaFile').value='';
          const t=document.getElementById('coaFileText'); if(t) t.textContent='Choose a CSV file or drag it here';
        } catch(e){ showM(m,e.message,false); }
      };
    }
    function showM(m,t,ok){ m.className='msg '+(ok?'ok':'err'); m.textContent=t; }
    // Reload cached Xero tax rates + accounts (use after adding a tax rate in Xero).
    window.refreshXeroCache = async (btn) => {
      const m=document.getElementById('xeroCacheMsg'); showM(m,'Refreshing…',true);
      if(btn) btn.disabled=true;
      try {
        const r=await fetch('/api/me/xero/refresh-cache',{method:'POST'}); const d=await r.json(); if(!r.ok) throw new Error(d.error||'Failed.');
        showM(m,'Tax rates & accounts refreshed for '+d.refreshed+' org(s).',true);
        // Fetch and display tax rates for each connected org
        const ratesList = document.getElementById('taxRatesList');
        const ratesTable = document.getElementById('taxRatesTable');
        if(CONNECTIONS.length && ratesList && ratesTable) {
          ratesList.style.display='block';
          let rows = `<tr style="border-bottom:1px solid var(--border);"><th style="text-align:left;padding:4px 6px;color:var(--muted);font-weight:500;">Name</th><th style="text-align:left;padding:4px 6px;color:var(--muted);font-weight:500;">Tax Type (ID)</th><th style="text-align:right;padding:4px 6px;color:var(--muted);font-weight:500;">Rate</th></tr>`;
          for(const conn of CONNECTIONS) {
            try {
              const tr=await fetch('/api/xero/tax-rates?tenantId='+encodeURIComponent(conn.xero_tenant_id)); const td=await tr.json();
              if(td.taxRates && td.taxRates.length) {
                rows += `<tr><td colspan="3" style="padding:6px 6px 2px;font-weight:600;font-size:.75rem;color:var(--muted)">${esc(conn.tenant_name||conn.xero_tenant_id)}</td></tr>`;
                for(const rate of td.taxRates) {
                  rows += `<tr style="border-bottom:1px solid var(--border-light,#eee);">
                    <td style="padding:4px 6px;">${esc(rate.name)}</td>
                    <td style="padding:4px 6px;font-family:monospace;color:var(--muted)">${esc(rate.taxType)}</td>
                    <td style="padding:4px 6px;text-align:right;">${rate.displayTaxRate != null ? rate.displayTaxRate+'%' : '—'}</td>
                  </tr>`;
                }
              }
            } catch(_){}
          }
          ratesTable.innerHTML = rows;
        }
      }
      catch(err){ showM(m,err.message,false); }
      finally { if(btn) btn.disabled=false; }
    };
    // Disconnect a specific org by its connection id (called from per-row Disconnect button).
    window.disconnectOrgById = async (connId, name) => {
      const m = document.getElementById('xeroDiscMsg');
      if (!confirm('Disconnect "'+name+'" from Xero?\n\nThis revokes WazzOCR\'s access to that organisation at Xero, then removes it here.')) return;
      showM(m,'Disconnecting…',true);
      try {
        const r=await fetch('/api/me/connections/'+connId,{method:'DELETE'}); const d=await r.json(); if(!r.ok) throw new Error(d.error||'Failed.');
        CONNECTIONS = CONNECTIONS.filter(c=>String(c.id)!==String(connId));
        showM(m,'Disconnected '+name+(d.revoked?'':' (removed here; could not reach Xero to revoke)'),true);
        wireSettings();
      } catch(e){ showM(m,e.message,false); }
    };
    // Reusable styled file picker (click or drag-drop), shows the chosen filename.
    function wireFileDrop(dropId, inputId, textId, placeholder){
      const drop=document.getElementById(dropId), input=document.getElementById(inputId), text=document.getElementById(textId);
      if(!drop||!input) return;
      const show=()=>{ const f=input.files[0]; text.innerHTML = f ? '<strong>'+esc(f.name)+'</strong>' : placeholder; };
      input.onchange=show;
      ['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('dragover');}));
      ['dragleave','dragend'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('dragover');}));
      drop.addEventListener('drop',e=>{ e.preventDefault(); drop.classList.remove('dragover'); if(e.dataTransfer.files.length){ input.files=e.dataTransfer.files; show(); } });
      show();
    }
    let CHAN_BY_ID = {};
    function renderChannels(channels){
      const box=document.getElementById('channelsBox'); if(!box) return;
      CHAN_BY_ID = {}; channels.forEach(c=>{ CHAN_BY_ID[c.id]=c; });
      window.PRIMARY_CHANNEL = channels[0] || null; // the channel the toggle + phone list act on
      box.innerHTML = channels.length ? `<table class="table"><tbody>${channels.map(c=>`<tr>
        <td><strong>${esc(c.label||'(no label)')}</strong> ${c.webhookRegistered?'<span class="badge success">Webhook registered</span>':'<span class="badge skipped">Not registered</span>'}</td>
        <td style="text-align:right;white-space:nowrap;">
          <button class="linkbtn" onclick="openChannelModal(${c.id})">View</button>
          &nbsp; <a href="#" onclick="regChannel(event,${c.id})">Register webhook</a>
          &nbsp; <a href="#" style="color:var(--bad)" onclick="removeChannel(event,${c.id})">Remove</a></td></tr>`).join('')}</tbody></table>`
        : '<div class="empty">No channels yet.</div>';
    }
    async function loadPhones(){
      const box=document.getElementById('phonesBox'); if(!box) return;
      try {
        const d = await (await fetch('/api/me/phones')).json();
        const phones = d.phones||[];
        box.innerHTML = phones.length ? `<table class="table"><tbody>${phones.map(p=>`<tr>
          <td><strong>${esc(p.phone)}</strong>${p.label?` <span class="muted">— ${esc(p.label)}</span>`:''}</td>
          <td style="text-align:right;"><a href="#" style="color:var(--bad)" onclick="delPhone(event,${p.id})">Remove</a></td></tr>`).join('')}</tbody></table>`
          : '<div class="empty">No numbers yet.</div>';
      } catch { box.innerHTML='<div class="empty">Could not load.</div>'; }
      renderPhonesCard();
    }
    // Render the phone-numbers card. Trial: restriction always on, just show the list.
    // Paid: show a toggle + always show the list/form so numbers can be managed freely.
    function renderPhonesCard(){
      const plan=(CURRENT_ACCOUNT&&CURRENT_ACCOUNT.plan)||'paid';
      const tw=document.getElementById('phoneToggleWrap'), hint=document.getElementById('phoneCardHint');
      const addWrap=document.getElementById('phoneAddWrap'), box=document.getElementById('phonesBox');
      if(!hint) return;
      if(plan==='trial'){
        if(tw) tw.innerHTML='';
        hint.textContent='These numbers can send bills to our WhatsApp for your account. Messages from any other number are ignored.';
        if(addWrap) addWrap.style.display=''; if(box) box.style.display=''; return;
      }
      const ch=window.PRIMARY_CHANNEL;
      if(!ch){
        if(tw) tw.innerHTML='';
        hint.textContent='Add a WhatsApp channel above first.';
        if(addWrap) addWrap.style.display='none'; if(box) box.style.display='none'; return;
      }
      const on=!!ch.phoneRestrictionEnabled;
      if(tw) tw.innerHTML=`<label class="switch-row">
        <span class="switch ${on?'is-on':''}">
          <input type="checkbox" ${on?'checked':''} onchange="togglePhoneRestrict(${ch.id},this.checked)">
          <span class="switch-track"></span>
          <span class="switch-thumb"></span>
        </span>
        <span class="switch-label">Restrict to allowed numbers only</span>
        <span class="switch-state ${on?'is-on':''}">${on?'ON':'OFF'}</span>
      </label>`;
      hint.textContent = on
        ? 'Restriction is ON — only the numbers below can send to your channel.'
        : 'Restriction is OFF — anyone can send. Add numbers below and turn ON to restrict.';
      if(addWrap) addWrap.style.display=''; if(box) box.style.display='';
    }
    window.togglePhoneRestrict = async (cid,enabled)=>{
      const m=document.getElementById('phoneMsg');
      try{ const r=await fetch('/api/me/channels/'+cid+'/phone-restriction',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled})});
        const d=await r.json(); if(!r.ok) throw new Error(d.error||'Failed.');
        if(window.PRIMARY_CHANNEL) window.PRIMARY_CHANNEL.phoneRestrictionEnabled=enabled;
        if(CHAN_BY_ID[cid]) CHAN_BY_ID[cid].phoneRestrictionEnabled=enabled;
        renderPhonesCard(); }
      catch(e){ if(m){ m.className='msg err'; m.textContent=e.message; } } };
    window.delPhone = async (e,id)=>{ e.preventDefault(); try{ await fetch('/api/me/phones/'+id,{method:'DELETE'}); loadPhones(); }catch(err){ alert(err.message); } };
    window.switchTab = switchTab;
    window.regChannel = async (e,id)=>{ e.preventDefault(); const m=document.getElementById('chanMsg'); showM(m,'Registering…',true);
      try{ const r=await fetch('/api/me/channels/'+id+'/register-webhook',{method:'POST'}); const d=await r.json(); if(!r.ok) throw new Error(d.error||'Failed.'); showM(m,'Webhook registered with Wazzup ✓',true); wireSettings(); }
      catch(err){ showM(m,err.message,false); } };
    window.removeChannel = async (e,id)=>{ e.preventDefault(); try{ await fetch('/api/me/channels/'+id,{method:'DELETE'}); wireSettings(); }catch(err){ alert(err.message); } };

    // ── Channel details modal ──
    const COPY_ICON = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    function copyBtn(value){ return `<button class="copy-btn" title="Copy" onclick="copyText(event,'${esc(value)}')">${COPY_ICON}</button>`; }
    window.openChannelModal = (id) => {
      const c = CHAN_BY_ID[id]; if(!c) return;
      openModal('Channel — ' + esc(c.label||'(no label)'), `
        <div class="kv"><div class="k">Channel ID</div><div style="display:flex;align-items:center;gap:.4rem;font-family:ui-monospace,monospace;word-break:break-all;">${esc(c.channel_id)} ${copyBtn(c.channel_id)}</div></div>
        <div class="kv"><div class="k">API key</div><div id="modalKey" style="display:flex;align-items:center;gap:.4rem;font-family:ui-monospace,monospace;word-break:break-all;">${c.hasApiKey?`${esc(c.apiKeyMasked)} <a href="#" onclick="revealModalKey(event,${id})">Reveal</a>`:'<span style="color:var(--bad)">no API key</span>'}</div></div>`);
    };
    window.revealModalKey = async (e,id)=>{ e.preventDefault();
      try{ const r=await fetch('/api/me/channels/'+id+'/api-key'); const d=await r.json(); if(!r.ok) throw new Error(d.error||'Failed.');
        document.getElementById('modalKey').innerHTML = `${esc(d.apiKey)} ${copyBtn(d.apiKey)}`;
      }catch(err){ alert(err.message); } };
    window.copyText = (e,t)=>{ e.preventDefault(); if(navigator.clipboard) navigator.clipboard.writeText(t);
      const btn=e.currentTarget; const o=btn.innerHTML; btn.innerHTML='<span style="color:var(--ok);font-size:.85rem;">✓</span>'; setTimeout(()=>{ btn.innerHTML=o; },1200); };
    function openModal(title, bodyHtml){
      let m=document.getElementById('appModal'); if(!m){ m=document.createElement('div'); m.id='appModal'; document.body.appendChild(m); }
      m.style.cssText='position:fixed;inset:0;z-index:2000;background:rgba(15,27,45,.45);display:flex;align-items:center;justify-content:center;padding:1rem;';
      m.innerHTML=`<div style="background:#fff;border-radius:14px;max-width:520px;width:100%;box-shadow:0 24px 60px rgba(8,16,45,.3);overflow:hidden;">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:1rem 1.25rem;border-bottom:1px solid var(--line);"><strong>${title}</strong><button class="linkbtn" style="font-size:1.1rem;" onclick="closeModal()">✕</button></div>
        <div style="padding:1.25rem;">${bodyHtml}</div></div>`;
      m.onclick=(ev)=>{ if(ev.target===m) closeModal(); };
    }
    window.closeModal=()=>{ const m=document.getElementById('appModal'); if(m) m.remove(); };

    // ── Reusable searchable dropdown ── items:[{value,label}]
    function searchDropdown(mount, items, opts){
      opts=opts||{}; const el=typeof mount==='string'?document.getElementById(mount):mount; if(!el) return null;
      let selected = opts.selected || (items[0]&&items[0].value) || '';
      el.className='sdrop';
      function labelOf(v){ const it=items.find(i=>i.value===v); return it?it.label:(opts.placeholder||'Select…'); }
      el.innerHTML=`<button type="button" class="sdrop-btn"><span class="sdrop-cur">${esc(labelOf(selected))}</span><span class="sdrop-caret">▾</span></button>
        <div class="sdrop-panel"><input class="sdrop-search" placeholder="Search…"><div class="sdrop-list"></div></div>`;
      const btn=el.querySelector('.sdrop-btn'), panel=el.querySelector('.sdrop-panel'), search=el.querySelector('.sdrop-search'), list=el.querySelector('.sdrop-list'), cur=el.querySelector('.sdrop-cur');
      function draw(q){ q=(q||'').toLowerCase(); const f=items.filter(i=>i.label.toLowerCase().includes(q));
        list.innerHTML=f.length?f.map(i=>`<div class="sdrop-opt${i.value===selected?' sel':''}" data-v="${esc(i.value)}">${esc(i.label)}</div>`).join(''):'<div class="sdrop-empty">No matches</div>';
        list.querySelectorAll('.sdrop-opt').forEach(o=>o.onclick=()=>{ selected=o.dataset.v; cur.textContent=o.textContent; closeP(); if(opts.onSelect)opts.onSelect(selected,o.textContent); }); }
      function openP(){ panel.classList.add('open'); search.value=''; draw(''); search.focus(); document.addEventListener('click',outside); }
      function closeP(){ panel.classList.remove('open'); document.removeEventListener('click',outside); }
      function outside(ev){ if(!el.contains(ev.target)) closeP(); }
      btn.onclick=(e)=>{ e.stopPropagation(); panel.classList.contains('open')?closeP():openP(); };
      search.oninput=()=>draw(search.value);
      el.value=()=>selected;
      return el;
    }
    window.__searchDropdown = searchDropdown;

    function showToast(text, ok){
      const d=document.createElement('div');
      d.textContent=text;
      d.style.cssText='position:fixed;top:1rem;left:50%;transform:translateX(-50%);z-index:1000;padding:.7rem 1.1rem;border-radius:10px;font-size:.9rem;font-weight:600;box-shadow:0 8px 24px rgba(16,35,92,.18);background:'+(ok?'#ECFDF3':'#FEF3F2')+';color:'+(ok?'#067647':'#B42318')+';';
      document.body.appendChild(d);
      setTimeout(()=>{ d.style.transition='opacity .4s'; d.style.opacity='0'; setTimeout(()=>d.remove(),400); },4500);
    }
    (function(){
      const q=new URLSearchParams(location.search); const x=q.get('xero'); if(!x) return;
      const reason=decodeURIComponent(q.get('reason')||'');
      if (x==='connected') showToast('Xero connected successfully ✓', true);
      else if (x==='error') showToast(/denied|cancel|access_denied/i.test(reason) ? 'Xero connection was cancelled.' : ('Xero connection failed' + (reason?': '+reason:'.')), false);
      // Strip the query but KEEP the hash, so load() can still honour e.g.
      // "#settings" (the Xero connect flow lands the user on that tab).
      history.replaceState({}, '', location.pathname + location.hash);
    })();
    load();
  </script>
</body>
</html>
