<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My account — WazzOCR</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div class="topbar">
    <span class="brand"><span class="logo">FE</span> WazzOCR</span>
    <div class="right"><span class="who" id="whoLabel"></span><button class="btn btn-ghost btn-sm" id="logoutBtn">Sign out</button></div>
  </div>
  <div class="container" id="content"><div class="card">Loading…</div></div>
  <script>
    let CONNECTIONS = [];
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
    function badge(s, reason){ const k=['success','failed','pending','skipped'].includes(s)?s:'skipped'; return `<span class="badge ${k}" title="${esc(reason||'')}">${esc(s)}</span>`; }
    function money(b){ return b.total!=null ? esc(b.currency||'')+' '+Number(b.total).toFixed(2) : '-'; }
    function dt(s){ return new Date(s).toLocaleDateString(); }
    document.getElementById('logoutBtn').onclick = async () => { await fetch('/auth/logout',{method:'POST'}); location.href='/login.html'; };

    async function load() {
      let data;
      try { const r = await fetch('/api/me/summary'); if (r.status===401){location.href='/login.html';return;} data = await r.json(); }
      catch { document.getElementById('content').innerHTML='<div class="card">Could not load. Please refresh.</div>'; return; }
      document.getElementById('whoLabel').textContent = data.user.name || data.user.email;
      const c = document.getElementById('content');
      if (data.user.isSuperAdmin) {
        c.innerHTML = `<div class="page-head"><h1>Account</h1></div>
          <div class="card"><div class="kv"><div class="k">Name</div><div>${esc(data.user.name||'-')}</div></div>
          <div class="kv"><div class="k">Email</div><div>${esc(data.user.email)}</div></div>
          <div class="kv"><div class="k">Role</div><div>Super admin (FusionETA)</div></div></div>
          <div class="card"><a class="btn btn-primary" href="/admin.html">Open the admin dashboard →</a></div>`;
        return;
      }
      c.innerHTML = `
        <div class="page-head"><h1>${esc(data.account?data.account.name:'My account')}</h1><p>Bill automation overview</p></div>
        <div class="card"><div class="eyebrow">Bills created this month</div>
          <div class="stat" style="margin-top:.4rem;"><span class="num">${data.successThisMonth!=null?data.successThisMonth:data.successCount}</span><span class="unit">bills</span></div>
          <div class="muted" style="margin-top:.3rem;">${data.successCount} all-time</div></div>
        <div class="tabs">
          <button data-tab="bills" class="active" onclick="switchTab('bills')">Bills</button>
          <button data-tab="unmatched" onclick="switchTab('unmatched')">Unmatched</button>
          <button data-tab="settings" onclick="switchTab('settings')">Settings</button>
        </div>
        <div class="panel active" id="panel-bills"><div class="card"><h2>Created bills</h2><div id="billsList">Loading…</div></div></div>
        <div class="panel" id="panel-unmatched"><div class="card"><h2>Unmatched / pending</h2><div id="pendingList">Loading…</div></div></div>
        <div class="panel" id="panel-settings">${settingsHtml(data)}</div>`;
      fetch('/api/me/connections').then(r=>r.json()).then(d=>{ CONNECTIONS = d.connections||[]; }).catch(()=>{});
      loadBills(); loadPending(); wireSettings();
    }
    function switchTab(name){
      document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active', b.dataset.tab===name));
      document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active', p.id==='panel-'+name));
    }
    function billRow(b, withXero){
      return `<tr id="row-${b.id}"><td class="num-cell" style="color:var(--muted)">${dt(b.created_at)}</td>
        <td>${esc(b.supplier||'-')}</td><td>${esc(b.invoice_no||'-')}</td>
        <td class="num-cell">${money(b)}</td>
        ${withXero ? `<td>${esc(b.xero_tenant_name||'—')}</td><td>${b.xero_url?`<a href="${esc(b.xero_url)}" target="_blank" rel="noopener">Open ↗</a>`:'-'}</td>`
                   : `<td><span class="muted">${esc(b.failure_reason||'-')}</span></td><td style="text-align:right;"><button class="linkbtn" onclick="openResolve(event,${b.id})">Resolve →</button></td>`}</tr>`;
    }
    const PAGE_SIZE = 15;
    const PG = {
      bills:   { items: [], page: 1, withXero: true,  container: 'billsList',   empty: 'No created bills yet.' },
      pending: { items: [], page: 1, withXero: false, container: 'pendingList', empty: 'Nothing pending 🎉' }
    };
    async function loadBills(){ await loadTab('bills', 'success'); }
    async function loadPending(){ await loadTab('pending', 'pending'); }
    async function loadTab(key, status){
      try {
        const { bills } = await (await fetch('/api/me/bills?status='+status+'&limit=500')).json();
        PG[key].items = bills || []; PG[key].page = 1; renderTab(key);
      } catch {}
    }
    function renderTab(key){
      const cfg = PG[key]; const el = document.getElementById(cfg.container); const items = cfg.items;
      if (!items.length) { el.innerHTML = '<div class="empty">'+cfg.empty+'</div>'; return; }
      const pages = Math.max(1, Math.ceil(items.length / PAGE_SIZE));
      if (cfg.page > pages) cfg.page = pages;
      const start = (cfg.page-1)*PAGE_SIZE;
      const slice = items.slice(start, start+PAGE_SIZE);
      const head = cfg.withXero
        ? '<th>Date</th><th>Supplier</th><th>Invoice</th><th>Total</th><th>Xero org</th><th>Xero</th>'
        : '<th>Date</th><th>Supplier</th><th>Invoice</th><th>Total</th><th>Reason</th><th></th>';
      const pager = pages > 1 ? `<div style="display:flex;justify-content:space-between;align-items:center;margin-top:.8rem;font-size:.82rem;color:var(--muted);">
          <span>Showing ${start+1}–${start+slice.length} of ${items.length}</span>
          <span><button class="btn btn-ghost btn-sm" ${cfg.page===1?'disabled':''} onclick="goPage('${key}',${cfg.page-1})">‹ Prev</button>
          <span style="margin:0 .6rem;">${cfg.page} / ${pages}</span>
          <button class="btn btn-ghost btn-sm" ${cfg.page===pages?'disabled':''} onclick="goPage('${key}',${cfg.page+1})">Next ›</button></span></div>` : '';
      el.innerHTML = `<table class="table"><thead><tr>${head}</tr></thead><tbody>${slice.map(b=>billRow(b,cfg.withXero)).join('')}</tbody></table>${pager}`;
    }
    window.goPage = (key, p) => { PG[key].page = p; renderTab(key); };

    // Resolve an unmatched bill: choose a Xero org → create the draft.
    window.openResolve = (e, id) => {
      e.preventDefault();
      if (!CONNECTIONS.length) { alert('No Xero organisations connected. Connect Xero under Settings first.'); return; }
      const row = document.getElementById('row-'+id); if (!row) return;
      const items = CONNECTIONS.map(c=>({ value:c.xero_tenant_id||c.tenantId, label:c.tenant_name||c.tenantName||c.xero_tenant_id }));
      row.innerHTML = `<td colspan="6"><div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;">
        <span class="muted">Create draft in:</span>
        <div id="rdrop-${id}" style="min-width:260px;"></div>
        <button class="btn btn-primary btn-sm" id="rbtn-${id}" onclick="doResolve(${id})">Create draft</button>
        <button class="linkbtn" onclick="loadPending()">Cancel</button>
        <span id="rmsg-${id}" class="muted"></span></div></td>`;
      window.__searchDropdown('rdrop-'+id, items, { placeholder:'Choose organisation' });
    };
    window.doResolve = async (id) => {
      const dd = document.getElementById('rdrop-'+id);
      const tenantId = dd && dd.value ? dd.value() : '';
      if (!tenantId) { document.getElementById('rmsg-'+id).textContent = 'Choose an organisation.'; return; }
      const msg = document.getElementById('rmsg-'+id); const btn = document.getElementById('rbtn-'+id);
      btn.disabled = true; msg.textContent = 'Creating…';
      try {
        const r = await fetch('/api/me/bills/'+id+'/resolve', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ tenantId }) });
        const d = await r.json(); if (!r.ok) throw new Error(d.error||'Failed.');
        msg.textContent = 'Created ✓';
        // refresh both tabs and the counter
        loadBills(); loadPending();
        fetch('/api/me/summary').then(r=>r.json()).then(s=>{ const n=document.querySelector('.stat .num'); if(n) n.textContent=(s.successThisMonth!=null?s.successThisMonth:s.successCount); }).catch(()=>{});
      } catch (e) { btn.disabled = false; msg.textContent = e.message; }
    };
    function settingsHtml(data){
      return `
      <div class="settings-grid">
        <div class="col-left">
          <div class="card"><h2>Account</h2>
            <div class="kv"><div class="k">Organisation</div><div>${esc(data.account?data.account.name:'-')}</div></div>
            <div class="kv"><div class="k">Signed in as</div><div>${esc(data.user.name||data.user.email)}</div></div>
            <div class="kv"><div class="k">Xero organisations</div><div id="connList">…</div></div>
            <a class="btn btn-primary" style="margin-top:.9rem;" href="/api/me/xero/connect">＋ Connect Xero</a>
          </div>
        </div>
        <div class="col-right">
          <div class="card"><h2>WhatsApp channels</h2>
            <p class="muted">Add your Wazzup channel so bills sent to it are processed for your account. After adding, click “Register webhook” once.</p>
            <div id="channelsBox" style="margin:.6rem 0;">…</div>
            <div class="grid2"><div class="field"><label>Channel ID</label><input id="chanId"></div><div class="field"><label>Label (optional)</label><input id="chanLabel"></div></div>
            <div class="field"><label>API key</label><input id="chanKey"></div>
            <button class="btn btn-primary" id="chanAddBtn">Add channel</button>
            <div class="msg" id="chanMsg"></div>
          </div>
          <div class="card"><h2>Chart of accounts</h2>
            <p class="muted">CSV columns: code, name, category. Replaces your current list; used to auto-code bill line items. <span id="coaCount"></span></p>
            <textarea id="coaCsv" rows="5" placeholder="926-0000,Utilities Expenses,Expense"></textarea>
            <div style="margin-top:.6rem;display:flex;gap:.5rem;flex-wrap:wrap;">
              <button class="btn btn-primary" id="coaBtn">Upload COA</button>
              <a class="btn btn-ghost" id="coaDownload" href="/api/me/coa.csv">⬇ Download CSV (template + current)</a>
            </div>
            <div class="msg" id="coaMsg"></div>
          </div>
        </div>
      </div>`;
    }
    async function wireSettings(){
      try {
        const [conn, chan, coa] = await Promise.all([
          fetch('/api/me/connections').then(r=>r.json()),
          fetch('/api/me/channels').then(r=>r.json()),
          fetch('/api/me/coa').then(r=>r.json())
        ]);
        const conns = conn.connections||[];
        const cl = document.getElementById('connList');
        if (!conns.length) cl.textContent = 'None connected';
        else {
          cl.innerHTML = `<div id="xeroDrop" style="max-width:340px;"></div><span class="muted" style="display:inline-block;margin-top:.35rem;">${conns.length} connected</span>`;
          window.__searchDropdown('xeroDrop', conns.map(x=>({ value:x.xero_tenant_id, label:x.tenant_name||x.xero_tenant_id })), { placeholder:'Browse organisations' });
        }
        renderChannels(chan.channels||[]);
        document.getElementById('coaCount').textContent = '— ' + (coa.accounts||[]).length + ' codes loaded';
      } catch {}
      document.getElementById('chanAddBtn').onclick = async () => {
        const m = document.getElementById('chanMsg');
        const channelId=document.getElementById('chanId').value.trim(), apiKey=document.getElementById('chanKey').value.trim(), label=document.getElementById('chanLabel').value.trim();
        if (!channelId){ showM(m,'Channel ID is required.',false); return; }
        try { const r=await fetch('/api/me/channels',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({channelId,apiKey:apiKey||undefined,label:label||undefined})});
          const d=await r.json(); if(!r.ok) throw new Error(d.error||'Add failed.');
          document.getElementById('chanId').value='';document.getElementById('chanKey').value='';document.getElementById('chanLabel').value='';
          showM(m,'Channel added. Now click “Register webhook”.',true); wireSettings();
        } catch(e){ showM(m,e.message,false); }
      };
      document.getElementById('coaBtn').onclick = async () => {
        const m=document.getElementById('coaMsg');
        try { const r=await fetch('/api/me/coa',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({csv:document.getElementById('coaCsv').value})});
          const d=await r.json(); if(!r.ok) throw new Error(d.error||'Upload failed.');
          showM(m,`Uploaded ${d.count} codes.`,true); document.getElementById('coaCount').textContent='— '+d.count+' codes loaded';
        } catch(e){ showM(m,e.message,false); }
      };
    }
    function showM(m,t,ok){ m.className='msg '+(ok?'ok':'err'); m.textContent=t; }
    let CHAN_BY_ID = {};
    function renderChannels(channels){
      const box=document.getElementById('channelsBox'); if(!box) return;
      CHAN_BY_ID = {}; channels.forEach(c=>{ CHAN_BY_ID[c.id]=c; });
      box.innerHTML = channels.length ? `<table class="table"><tbody>${channels.map(c=>`<tr>
        <td><strong>${esc(c.label||'(no label)')}</strong></td>
        <td style="text-align:right;white-space:nowrap;">
          <button class="linkbtn" onclick="openChannelModal(${c.id})">View</button>
          &nbsp; <a href="#" onclick="regChannel(event,${c.id})">Register webhook</a>
          &nbsp; <a href="#" style="color:var(--bad)" onclick="removeChannel(event,${c.id})">Remove</a></td></tr>`).join('')}</tbody></table>`
        : '<div class="empty">No channels yet.</div>';
    }
    window.switchTab = switchTab;
    window.regChannel = async (e,id)=>{ e.preventDefault(); const m=document.getElementById('chanMsg'); showM(m,'Registering…',true);
      try{ const r=await fetch('/api/me/channels/'+id+'/register-webhook',{method:'POST'}); const d=await r.json(); if(!r.ok) throw new Error(d.error||'Failed.'); showM(m,'Webhook registered with Wazzup ✓',true); }
      catch(err){ showM(m,err.message,false); } };
    window.removeChannel = async (e,id)=>{ e.preventDefault(); try{ await fetch('/api/me/channels/'+id,{method:'DELETE'}); wireSettings(); }catch(err){ alert(err.message); } };

    // ── Channel details modal ──
    window.openChannelModal = (id) => {
      const c = CHAN_BY_ID[id]; if(!c) return;
      openModal('Channel — ' + esc(c.label||'(no label)'), `
        <div class="kv"><div class="k">Channel ID</div><div style="font-family:ui-monospace,monospace;word-break:break-all;">${esc(c.channel_id)} &nbsp;<a href="#" onclick="copyText(event,'${esc(c.channel_id)}')">Copy</a></div></div>
        <div class="kv"><div class="k">API key</div><div id="modalKey" style="font-family:ui-monospace,monospace;word-break:break-all;">${c.hasApiKey?`${esc(c.apiKeyMasked)} &nbsp;<a href="#" onclick="revealModalKey(event,${id})">Reveal</a>`:'<span style="color:var(--bad)">no API key</span>'}</div></div>`);
    };
    window.revealModalKey = async (e,id)=>{ e.preventDefault();
      try{ const r=await fetch('/api/me/channels/'+id+'/api-key'); const d=await r.json(); if(!r.ok) throw new Error(d.error||'Failed.');
        document.getElementById('modalKey').innerHTML = `${esc(d.apiKey)} &nbsp;<a href="#" onclick="copyText(event,'${esc(d.apiKey)}')">Copy</a>`;
      }catch(err){ alert(err.message); } };
    window.copyText = (e,t)=>{ e.preventDefault(); if(navigator.clipboard) navigator.clipboard.writeText(t); const a=e.target; const o=a.textContent; a.textContent='Copied ✓'; setTimeout(()=>a.textContent=o,1200); };
    function openModal(title, bodyHtml){
      let m=document.getElementById('appModal'); if(!m){ m=document.createElement('div'); m.id='appModal'; document.body.appendChild(m); }
      m.style.cssText='position:fixed;inset:0;z-index:2000;background:rgba(15,27,45,.45);display:flex;align-items:center;justify-content:center;padding:1rem;';
      m.innerHTML=`<div style="background:#fff;border-radius:14px;max-width:520px;width:100%;box-shadow:0 24px 60px rgba(8,16,45,.3);overflow:hidden;">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:1rem 1.25rem;border-bottom:1px solid var(--line);"><strong>${title}</strong><button class="linkbtn" style="font-size:1.1rem;" onclick="closeModal()">✕</button></div>
        <div style="padding:1.25rem;">${bodyHtml}</div></div>`;
      m.onclick=(ev)=>{ if(ev.target===m) closeModal(); };
    }
    window.closeModal=()=>{ const m=document.getElementById('appModal'); if(m) m.remove(); };

    // ── Reusable searchable dropdown ── items:[{value,label}]
    function searchDropdown(mount, items, opts){
      opts=opts||{}; const el=typeof mount==='string'?document.getElementById(mount):mount; if(!el) return null;
      let selected = opts.selected || (items[0]&&items[0].value) || '';
      el.className='sdrop';
      function labelOf(v){ const it=items.find(i=>i.value===v); return it?it.label:(opts.placeholder||'Select…'); }
      el.innerHTML=`<button type="button" class="sdrop-btn"><span class="sdrop-cur">${esc(labelOf(selected))}</span><span class="sdrop-caret">▾</span></button>
        <div class="sdrop-panel"><input class="sdrop-search" placeholder="Search…"><div class="sdrop-list"></div></div>`;
      const btn=el.querySelector('.sdrop-btn'), panel=el.querySelector('.sdrop-panel'), search=el.querySelector('.sdrop-search'), list=el.querySelector('.sdrop-list'), cur=el.querySelector('.sdrop-cur');
      function draw(q){ q=(q||'').toLowerCase(); const f=items.filter(i=>i.label.toLowerCase().includes(q));
        list.innerHTML=f.length?f.map(i=>`<div class="sdrop-opt${i.value===selected?' sel':''}" data-v="${esc(i.value)}">${esc(i.label)}</div>`).join(''):'<div class="sdrop-empty">No matches</div>';
        list.querySelectorAll('.sdrop-opt').forEach(o=>o.onclick=()=>{ selected=o.dataset.v; cur.textContent=o.textContent; closeP(); if(opts.onSelect)opts.onSelect(selected,o.textContent); }); }
      function openP(){ panel.classList.add('open'); search.value=''; draw(''); search.focus(); document.addEventListener('click',outside); }
      function closeP(){ panel.classList.remove('open'); document.removeEventListener('click',outside); }
      function outside(ev){ if(!el.contains(ev.target)) closeP(); }
      btn.onclick=(e)=>{ e.stopPropagation(); panel.classList.contains('open')?closeP():openP(); };
      search.oninput=()=>draw(search.value);
      el.value=()=>selected;
      return el;
    }
    window.__searchDropdown = searchDropdown;

    function showToast(text, ok){
      const d=document.createElement('div');
      d.textContent=text;
      d.style.cssText='position:fixed;top:1rem;left:50%;transform:translateX(-50%);z-index:1000;padding:.7rem 1.1rem;border-radius:10px;font-size:.9rem;font-weight:600;box-shadow:0 8px 24px rgba(16,35,92,.18);background:'+(ok?'#ECFDF3':'#FEF3F2')+';color:'+(ok?'#067647':'#B42318')+';';
      document.body.appendChild(d);
      setTimeout(()=>{ d.style.transition='opacity .4s'; d.style.opacity='0'; setTimeout(()=>d.remove(),400); },4500);
    }
    (function(){
      const q=new URLSearchParams(location.search); const x=q.get('xero'); if(!x) return;
      const reason=decodeURIComponent(q.get('reason')||'');
      if (x==='connected') showToast('Xero connected successfully ✓', true);
      else if (x==='error') showToast(/denied|cancel|access_denied/i.test(reason) ? 'Xero connection was cancelled.' : ('Xero connection failed' + (reason?': '+reason:'.')), false);
      history.replaceState({}, '', location.pathname);
    })();
    load();
  </script>
</body>
</html>
