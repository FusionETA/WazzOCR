<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — WazzOCR</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div class="auth-bg">
    <div class="auth-card">
      <span class="logo">FE</span>
      <h1>Welcome back</h1>
      <p class="sub">Sign in to WazzOCR</p>

      <a href="/auth/google" class="google-btn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.4 29.3 35 24 35c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.5 0 20-7.6 20-21 0-1.2-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 5.1 29.6 3 24 3 16 3 9.1 7.6 6.3 14.7z"/><path fill="#4CAF50" d="M24 45c5.2 0 10-2 13.6-5.2l-6.3-5.3C29.2 36 26.7 37 24 37c-5.3 0-9.7-2.6-11.3-7l-6.5 5C9 40.3 15.9 45 24 45z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4 5.5l6.3 5.3C41.4 36.3 44 30.7 44 24c0-1.2-.1-2.3-.4-3.5z"/></svg>
        Continue with Google
      </a>
      <div class="divider"><span>or</span></div>

      <form id="loginForm">
        <label class="fld" for="email">Email</label>
        <input type="email" id="email" autocomplete="username" required>
        <label class="fld" for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" autocomplete="current-password" required>
          <button type="button" class="pw-toggle" data-pw="password" aria-label="Show password"></button>
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn" style="width:100%;margin-top:1.4rem;">Sign in</button>
      </form>
      <div class="msg" id="msg"></div>
      <div class="links"><a id="forgotLink" style="cursor:pointer;">Forgot password?</a></div>
    </div>
  </div>
  <script src="/pw-toggle.js"></script>
  <script>
    const msg = document.getElementById('msg');
    function showMsg(t, ok) { msg.textContent = t; msg.className = 'msg ' + (ok ? 'ok' : 'err'); }
    (function () {
      const err = new URLSearchParams(location.search).get('error');
      const map = {
        notinvited: 'That Google account is not set up yet. Please ask your provider to invite you first.',
        unverified: 'Your Google email is not verified.',
        disabled: 'This account has been disabled.',
        google: 'Google sign-in failed. Please try again.'
      };
      if (err) showMsg(map[err] || 'Sign-in error. Please try again.');
    })();
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn'); btn.disabled = true;
      try {
        const r = await fetch('/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value.trim(), password: document.getElementById('password').value }) });
        const data = await r.json();
        if (!r.ok) { showMsg(data.error || 'Sign in failed.'); btn.disabled = false; return; }
        window.location.href = (data.user && data.user.isSuperAdmin) ? '/admin.html' : '/account.html';
      } catch (err) { showMsg('Network error. Please try again.'); btn.disabled = false; }
    });
    document.getElementById('forgotLink').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      if (!email) { showMsg('Enter your email above first, then tap Forgot password.'); return; }
      await fetch('/auth/forgot', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
      showMsg('If that email is registered, a reset link has been sent to your WhatsApp.', true);
    });
  </script>
</body>
</html>
