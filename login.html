  <script>
    const msg = document.getElementById('msg');
    function showMsg(t, ok) { msg.textContent = t; msg.className = 'msg ' + (ok ? 'ok' : 'err'); }
    (function () {
      const err = new URLSearchParams(location.search).get('error');
      const map = {
        notinvited: 'That Google account is not set up yet. Please ask your provider to invite you first.',
        unverified: 'Your Google email is not verified.',
        disabled: 'This account has been disabled.',
        phone_taken: 'That phone number is already registered. Please sign in instead.',
        google: 'Google sign-in failed. Please try again.',
        xero: 'Xero sign-in failed. Please try again.'
      };
      if (err) showMsg(map[err] || 'Sign-in error. Please try again.');
    })();
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn'); btn.disabled = true;
      try {
        const r = await fetch('/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value.trim(), password: document.getElementById('password').value }) });
        const data = await r.json();
        if (!r.ok) { showMsg(data.error || 'Sign in failed.'); btn.disabled = false; return; }
        window.location.href = (data.user && data.user.isSuperAdmin) ? '/admin.html' : '/account.html';
      } catch (err) { showMsg('Network error. Please try again.'); btn.disabled = false; }
    });
    document.getElementById('forgotLink').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      if (!email) { showMsg('Enter your email above first, then tap Forgot password.'); return; }
      await fetch('/auth/forgot', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
      showMsg('If that email is registered, a reset link has been sent to your WhatsApp.', true);
    });
  </script>
