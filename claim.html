<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set your password — WazzOCR</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
</head>
<body>
  <div class="auth-bg">
    <div class="auth-card">
      <img class="auth-logo" src="/assets/fusioneta-logo.png" alt="FusionETA">
      <h1>Set your password</h1>
      <p class="sub">Finish setting up your WazzOCR account.</p>
      <form id="claimForm">
        <label class="fld" for="password">New password</label>
        <input type="password" id="password" autocomplete="new-password" minlength="8" required>
        <label class="fld" for="confirm">Confirm password</label>
        <input type="password" id="confirm" autocomplete="new-password" minlength="8" required>
        <button type="submit" class="btn btn-primary" id="submitBtn" style="width:100%;margin-top:1.4rem;">Set password &amp; sign in</button>
      </form>
      <div class="msg" id="msg"></div>
    </div>
  </div>
  <script>
    const token = new URLSearchParams(location.search).get('token');
    const msg = document.getElementById('msg');
    function showMsg(t, ok) { msg.textContent = t; msg.className = 'msg ' + (ok ? 'ok' : 'err'); }
    if (!token) showMsg('This link is missing its token. Please use the link from your WhatsApp invite.');
    document.getElementById('claimForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = document.getElementById('password').value, cf = document.getElementById('confirm').value;
      if (pw !== cf) { showMsg('Passwords do not match.'); return; }
      if (pw.length < 8) { showMsg('Password must be at least 8 characters.'); return; }
      const btn = document.getElementById('submitBtn'); btn.disabled = true;
      try {
        const r = await fetch('/auth/claim', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, password: pw }) });
        const data = await r.json();
        if (!r.ok) { showMsg(data.error || 'Could not set password.'); btn.disabled = false; return; }
        window.location.href = (data.user && data.user.isSuperAdmin) ? '/admin.html' : '/account.html';
      } catch (err) { showMsg('Network error. Please try again.'); btn.disabled = false; }
    });
  </script>
</body>
</html>
